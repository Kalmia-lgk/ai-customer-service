# ============================================================
# AI 智能客服系统 - Docker Compose 编排
# ============================================================
version: "3.9"

services:
  # ---------- AI 客服后端服务 ----------
  app:
    build: .
    container_name: ai-customer-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # LLM 配置（从 .env 文件加载，或在此处直接设置）
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      # 应用配置
      - HOST=0.0.0.0
      - PORT=8000
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - UPLOAD_DIR=/app/data/uploads
      - MAX_UPLOAD_SIZE_MB=100
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
    volumes:
      # 持久化数据
      - app-data:/app/data
      # 开发时挂载代码以支持热重载（生产环境注释掉）
      # - ./backend:/app/backend
      # - ./static:/app/static
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network

volumes:
  app-data:
    driver: local

networks:
  app-network:
    driver: bridge
