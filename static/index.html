<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能客服</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 聊天主区域 -->
        <main id="chat-area">
            <header class="chat-header">
                <div style="display:flex;align-items:center;gap:0.65rem;">
                    <span style="font-size:1.3rem;">🤖</span>
                    <span class="chat-title">AI 智能客服</span>
                    <span class="status-badge online" id="status-badge" style="display:none;">🟢 在线</span>
                </div>
                <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
            </header>

            <div id="messages-container">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon">🤖</div>
                    <h1 class="welcome-title">您好，我是 AI 智能客服</h1>
                    <p class="welcome-subtitle">有什么可以帮助您的？<br>如需人工服务，请点击下方「转人工」按钮</p>
                </div>
            </div>

            <div id="input-area">
                <!-- 转人工状态条 -->
                <div id="escalation-bar" style="display:none;padding:0.5rem 0.75rem;margin-bottom:0.5rem;border-radius:10px;font-size:0.8rem;text-align:center;font-weight:500;"></div>
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="输入您的问题..." rows="1"></textarea>
                    <button class="btn-escalate" id="btn-escalate">🎧 转人工</button>
                    <button class="btn-send" id="btn-send">➤</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 转人工确认弹窗 -->
    <div class="modal-overlay" id="escalate-modal" style="display:none;">
        <div class="modal">
            <h3>🎧 确认转人工</h3>
            <p>确定要转接人工客服吗？人工客服接入后将继续为您服务。</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-escalate-cancel">取消</button>
                <button class="btn-confirm" id="btn-escalate-confirm">确认转接</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/14.1.3/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
